<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Synthio Labs Voice AI</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Critical CSS: prevent FOUC – show loader, hide dashboard cards until main CSS loads -->
  <style>
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #060608;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .hidden {
      display: none !important;
    }
    /* Hide dashboard grid until main CSS loads – prevents cards flashing on refresh */
    .main-layout .dashboard-grid {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    /* Start left/right panels off-screen so they don't slide on load (avoids slide glitch) */
    .main-layout .left-panel {
      transform: translateX(calc(-100% - 24px));
      visibility: hidden;
      pointer-events: none;
    }
    .main-layout .right-panel {
      transform: translateX(calc(100% + 24px));
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-container">
      <div class="loading-text" id="loading-text">Intitializing...</div>
    </div>
  </div>

  <!-- ===== PERSONA SELECTION SCREEN (3D Carousel) ===== -->
  <!-- Agent selection — Nester Voice AI layout: light page, white cards,
       gradient orb banner, category pill, black Try Now button -->
  <div class="persona-selection-screen" id="persona-selection-screen">
    <header class="persona-header">
      <p class="persona-eyebrow">Synthio Labs Voice AI</p>
      <h1 class="persona-title">Choose your agent</h1>
    </header>

    <div class="persona-carousel" id="persona-carousel">
      <!-- Cards injected by app.ts -->
    </div>

    <footer class="persona-footer">
      <p class="persona-powered">Powered by Synthio Labs AI</p>
    </footer>
  </div>

  <!-- ===== NESTER DESIGN LANGUAGE LAYOUT ===== -->

  <!-- Main Layout -->
  <main class="main-layout panels-hidden">
    <!-- Noise texture overlay -->
    <div class="noise-overlay" aria-hidden="true"></div>

    <!-- Top Navigation Bar -->
    <header class="session-header" id="session-header">
      <div class="session-brand"></div>
      <div class="session-info">
        <div class="session-status-dot"></div>
        <span class="session-timer" id="session-timer">00:00</span>
      </div>
    </header>

    <!-- Mission Control Peek Header (mini orb + agent name + live status) -->
    <header class="mc-header" id="mc-header">
      <div class="mc-header-left">
        <div class="mc-orb">
          <div class="mc-orb-glow"></div>
          <div class="mc-orb-core"></div>
        </div>
        <div class="mc-agent-info">
          <span class="mc-agent-name" id="mc-agent-name">Agent</span>
          <div class="mc-live-badge">
            <span class="mc-live-dot"></span>
            <span class="mc-live-text">Live</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Mission Control Dashboard Panel (slides up from bottom) -->
    <div class="dashboard-grid" id="dashboard-grid" aria-hidden="true">
      <section class="mc-panel">
        <div class="mc-panel-grid mc-panel-grid--emotion-only">
          <!-- EMOTION ANALYSIS (full width, centered) -->
          <div class="mc-col-center mc-col-center--full">
            <div class="dashboard-card mc-card-emotion mc-card-emotion--hero" id="dashboard-card-4">
              <div class="dashboard-card-header">
                <span class="dashboard-card-label">EMOTION ANALYSIS</span>
              </div>
              <div class="dashboard-card-body">
                <div id="emotion-analysis-root" class="dashboard-card-inner emotion-analysis-topic"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Conversation Analysis (hidden, kept for data) -->
    <div class="hidden" id="dashboard-card-1">
      <div id="synchronized-analysis-root" class="dashboard-card-inner"></div>
    </div>

    <!-- Legacy left panel (hidden when dashboard shown) -->
    <aside class="left-panel legacy-panel">
      <div class="panel emotion-panel hidden" id="emotion-panel-legacy"></div>
      <div class="panel knowledge-graph-panel hidden" id="knowledge-graph-legacy"></div>
    </aside>

    <!-- CENTER: Voice Interaction Space -->
    <section class="center-section">
      <div class="connect-area hidden" id="connect-area" aria-hidden="true"></div>

      <!-- Agent Identity (monogram + name + status) — text-first, no photos -->
      <div class="agent-identity" id="agent-identity">
        <div class="agent-avatar-wrap" id="agent-avatar-wrap">
          <span class="agent-avatar-monogram" id="agent-avatar-monogram">R</span>
        </div>
        <h2 class="agent-name" id="agent-name">Riya</h2>
        <span class="agent-status" id="agent-status">Listening...</span>
      </div>

      <!-- Liquid Metallic AI Orb -->
      <div class="orb-container" id="ai-orb">
        <div class="liquid-blob" id="liquid-blob">
          <div class="orb-inner-glow"></div>
        </div>
      </div>

      <!-- Live Captions (below orb) -->
      <div class="live-subtitle" id="live-subtitle" aria-live="polite">
        <span class="live-subtitle-text" id="live-subtitle-text"></span>
      </div>

      <!-- Bottom Control Bar (glass pill) -->
      <footer class="session-controls" id="session-controls">
        <div class="glass-pill-bar" id="media-control-bar" aria-label="Media controls">
          <div class="media-control-group" id="media-control-group">
            <!-- Volume -->
            <button type="button" class="pill-btn pill-btn-icon" id="control-speaker" aria-label="Sound">
              <svg fill="none" height="20" width="20" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <div class="pill-divider"></div>
            <!-- Mic -->
            <button type="button" class="pill-btn pill-btn-icon pill-btn-mic-active" id="control-mic" aria-label="Microphone">
              <svg fill="none" height="20" width="20" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M19 10v2a7 7 0 01-14 0v-2" stroke-linecap="round" stroke-linejoin="round"></path>
                <line x1="12" y1="19" x2="12" y2="22" stroke-linecap="round" stroke-linejoin="round"></line>
              </svg>
              <span class="mic-indicator"></span>
            </button>
            <div class="pill-divider"></div>
            <!-- Noise Cancellation -->
            <button type="button" class="pill-btn pill-btn-icon pill-btn-nc-active" id="control-nc" aria-label="Noise cancellation" title="Noise Cancellation: ON (tight VAD)">
              <svg fill="none" height="20" width="20" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 9a3 3 0 116 0v3a3 3 0 01-6 0V9z" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M5 11a7 7 0 0014 0" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" class="nc-slash-line" style="display:none"></path>
              </svg>
              <span class="nc-badge">NC</span>
            </button>
            <div class="pill-divider"></div>
            <!-- End Call -->
            <button type="button" class="pill-btn pill-btn-icon" id="control-close" aria-label="End call">
              <svg fill="none" height="20" width="20" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
            <div class="pill-divider hide-on-mobile"></div>
            <!-- Peek -->
            <button type="button" class="pill-btn pill-btn-peek hide-on-mobile" id="control-peak" aria-label="Peek view">
              <span class="pill-btn-label">Peek</span>
              <svg fill="none" height="18" width="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
          <div class="close-options-group" id="close-options-group" aria-label="Restart or Peek">
            <button type="button" class="pill-btn pill-btn-icon" id="close-option-restart" aria-label="Restart">
              <svg fill="none" height="18" width="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 4v6h6M23 20v-6h-6" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
              <span class="pill-btn-label">Restart</span>
            </button>
            <div class="pill-divider hide-on-mobile"></div>
            <button type="button" class="pill-btn pill-btn-peek hide-on-mobile" id="close-option-peak" aria-label="Peek">
              <span class="pill-btn-label">Peek</span>
              <svg fill="none" height="18" width="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </button>
          </div>
        </div>
      </footer>

      <!-- Gemini Wave Visualizer (hidden, kept for audio analysis) -->
      <div class="wave-container" id="gemini-wave-container" style="display:none;">
        <canvas id="gemini-wave-canvas" class="wave-canvas"></canvas>
      </div>
    </section>

    <!-- RIGHT PANEL (hidden when dashboard shown) -->
    <aside class="right-panel">
      <!-- Topic Timeline Panel -->
      <div class="panel topic-timeline-panel">
        <div class="panel-header">
          <span class="panel-label">TOPIC FLOW</span>
          <div class="topic-legend">
            <span class="topic-legend-item"><span class="topic-dot new"></span>NEW</span>
            <span class="topic-legend-item"><span class="topic-dot continue"></span>CONTINUE</span>
            <span class="topic-legend-item"><span class="topic-dot branch"></span>BRANCH</span>
          </div>
        </div>
        <div class="topic-timeline-body">
          <canvas id="topic-timeline-canvas"></canvas>
        </div>
      </div>

      <!-- System Terminal Panel -->
      <div class="panel terminal-panel">
        <div class="panel-header">
          <span class="panel-label">SYSTEM</span>
        </div>
        <div class="terminal-body" id="terminal-content">
          <div class="terminal-line">Voice AI</div>
          <div class="terminal-line dim">Ready to connect...</div>
          <div class="terminal-line typing" id="typing-line"></div>
        </div>
      </div>
    </aside>

  </main>

  <!-- Expanded Emotion Analysis Modal (click on Emotion card in Peek mode) -->
  <div class="emotion-expanded-overlay" id="emotion-expanded-overlay">
    <div class="emotion-expanded-modal">
      <div class="emotion-expanded-header">
        <span class="emotion-expanded-title">EMOTION ANALYSIS</span>
        <div class="emotion-expanded-legend">
          <span class="emotion-expanded-legend-item"><span class="emotion-expanded-dot cyan"></span>Valence</span>
          <span class="emotion-expanded-legend-item"><span class="emotion-expanded-dot orange"></span>Arousal</span>
          <span class="emotion-expanded-legend-item"><span class="emotion-expanded-dot purple"></span>Dominance</span>
          <span class="emotion-expanded-legend-item"><span class="emotion-expanded-dot green"></span>Engagement</span>
          <span class="emotion-expanded-legend-item"><span class="emotion-expanded-dot blue"></span>Stability</span>
        </div>
      </div>
      <div class="emotion-expanded-body">
        <div id="emotion-analysis-expanded-root"></div>
      </div>
    </div>
  </div>

  <!-- Debug Panel (Hidden by default) -->
  <div class="debug-panel" id="debug-panel">
    <div class="debug-header">
      <span>DEBUG</span>
      <button class="debug-close" id="debug-close">&times;</button>
    </div>
    <div class="debug-content" id="debug-log"></div>
  </div>

  <!-- Toggle Buttons (Debug only; panels toggle is control-btn-peak in media bar) -->
  <!-- <div class="toggle-buttons">
    <button class="toggle-btn" id="debug-toggle" aria-label="Toggle Debug">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 20V10"/>
        <path d="M18 20V4"/>
        <path d="M6 20v-4"/>
      </svg>
    </button>
  </div> -->

  <!-- Hidden Elements -->
  <audio id="bot-audio" autoplay></audio>

  <!-- A2UI Visual Cards Container -->
  <div class="a2ui-panel" id="a2ui-panel">
    <!-- <button class="a2ui-panel-close" id="a2ui-close" aria-label="Close">&times;</button> -->
    <div class="a2ui-content" id="a2ui-container"></div>
  </div>


  <!-- Hidden legacy elements for JS compatibility -->
  <div id="scanner-frame" class="hidden"></div>
  <div id="voice-orb-container" class="hidden"></div>
  <div id="orb-status" class="hidden"></div>
  <canvas id="waveform-canvas" class="hidden"></canvas>
  <canvas id="circular-canvas" class="hidden"></canvas>
  <canvas id="preloader-canvas" class="hidden"></canvas>

  <script type="module" src="/src/app.ts"></script>
  <script type="module" src="/src/components/SynchronizedAnalysisWidget/mount.tsx"></script>
  <script type="module" src="/src/components/EmotionAnalysisWidget/mount.tsx"></script>
  <script type="module" src="/src/components/InsightsDashboard/mount.tsx"></script>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/components/a2ui/a2ui-styles.css?v=7">
</body>

</html>
